---
# Production resource and replica overrides.
# Replace base values with values for higher load.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hopeup
spec:
  replicas: 5  # baseline; HPA can scale higher
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hopeup
spec:
  replicas: 5
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: hopeup
spec:
  replicas: 10
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: hopeup
spec:
  minReplicas: 5
  maxReplicas: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: hopeup
spec:
  minReplicas: 10
  maxReplicas: 50
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hopeup-ingress
  namespace: hopeup
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "200"
spec:
  tls:
    - hosts:
        - hopeup.example.com
        - api.hopeup.example.com
      secretName: hopeup-tls
