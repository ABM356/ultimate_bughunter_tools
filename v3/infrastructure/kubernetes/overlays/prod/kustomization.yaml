apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hopeup

commonLabels:
  environment: production

resources:
  - ../../base

patches:
  - path: patches.yaml

# Production images come from a tagged release. CI fills in newTag.
images:
  - name: ghcr.io/hopeup/backend
    newTag: v1.0.0
  - name: ghcr.io/hopeup/frontend
    newTag: v1.0.0

configMapGenerator:
  - name: hopeup-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=https://hopeup.example.com
      - SENTRY_TRACES_SAMPLE_RATE=0.05
