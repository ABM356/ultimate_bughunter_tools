apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hopeup-dev

namePrefix: dev-

commonLabels:
  environment: dev

resources:
  - ../../base

patches:
  # Cut all replicas to 1
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: worker
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: StatefulSet
      name: elasticsearch
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  # Lower HPA bounds
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  - target:
      kind: HorizontalPodAutoscaler
      name: worker-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5
  # Smaller resources
  - target:
      kind: Deployment
      labelSelector: tier=api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
  # Dev hostname for ingress
  - target:
      kind: Ingress
      name: hopeup-ingress
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: hopeup.dev
      - op: replace
        path: /spec/rules/0/host
        value: hopeup.dev

configMapGenerator:
  - name: hopeup-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
      - LOG_LEVEL=debug
      - CORS_ORIGINS=https://hopeup.dev,http://localhost:3000

images:
  - name: ghcr.io/hopeup/backend
    newTag: dev
  - name: ghcr.io/hopeup/frontend
    newTag: dev
