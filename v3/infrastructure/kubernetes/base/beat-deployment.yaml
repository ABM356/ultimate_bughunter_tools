apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: hopeup
  labels:
    app: beat
    tier: scheduler
    version: v1
spec:
  # Beat MUST be a singleton or jobs will be scheduled multiple times.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beat
      tier: scheduler
  template:
    metadata:
      labels:
        app: beat
        tier: scheduler
        version: v1
    spec:
      serviceAccountName: hopeup-backend
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: beat
          image: ghcr.io/hopeup/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args:
            - "-A"
            - "app.tasks.celery_app"
            - "beat"
            - "--loglevel=info"
            - "--scheduler=redbeat.RedBeatScheduler"  # Redis-backed schedule for HA-friendly storage
          envFrom:
            - configMapRef:
                name: hopeup-config
            - secretRef:
                name: hopeup-secrets
          env:
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(CELERY_BROKER_DB)"
            - name: REDBEAT_REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/3"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep 'celery.*beat'"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep 'celery.*beat'"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
