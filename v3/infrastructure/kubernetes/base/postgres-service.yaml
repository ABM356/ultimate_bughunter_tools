---
# Headless service: gives each pod a stable DNS name (postgres-0, postgres-1, ...)
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: hopeup
  labels:
    app: postgres
    tier: data
spec:
  clusterIP: None
  selector:
    app: postgres
    tier: data
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# Regular ClusterIP for app traffic (round-robin to all replicas).
# In a real HA setup, point apps at the primary via a separate selector.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: hopeup
  labels:
    app: postgres
    tier: data
spec:
  type: ClusterIP
  selector:
    app: postgres
    tier: data
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
