apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: hopeup
  labels:
    app: worker
    tier: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    # Scale on Redis queue depth.
    # PLACEHOLDER: requires Prometheus Adapter or KEDA scaler to expose
    # `celery_queue_length` as an external metric. Configure with KEDA like:
    #
    #   apiVersion: keda.sh/v1alpha1
    #   kind: ScaledObject
    #   spec:
    #     triggers:
    #       - type: redis
    #         metadata:
    #           address: redis:6379
    #           listName: celery
    #           listLength: "20"
    #
    - type: External
      external:
        metric:
          name: celery_queue_length
          selector:
            matchLabels:
              queue: scans
        target:
          type: AverageValue
          averageValue: "20"  # scale up when each pod has > 20 queued jobs
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # workers shouldn't scale down too quickly
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
