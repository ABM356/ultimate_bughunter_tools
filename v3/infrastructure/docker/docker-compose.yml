# HopeUp Security Platform - Local development stack
# All services share a single bridge network so they can resolve each other by name.
version: "3.9"

networks:
  hopeup-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  elasticsearch-data:
    driver: local
  redis-data:
    driver: local

services:
  postgres:
    image: postgres:16
    container_name: hopeup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hopeup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hopeup_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hopeup}
      # Speed up local dev; do not use these flags in production
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hopeup-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hopeup} -d ${POSTGRES_DB:-hopeup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hopeup-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hopeup-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hopeup-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      # Security disabled for local dev only. NEVER do this in production.
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=hopeup-dev-cluster
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - hopeup-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: hopeup-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=hopeup-kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hopeup-net

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: hopeup-backend
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hopeup}:${POSTGRES_PASSWORD:-hopeup_dev_password}@postgres:5432/${POSTGRES_DB:-hopeup}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - hopeup-net
    volumes:
      - ../../backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: hopeup-worker
    restart: unless-stopped
    # Same image as backend, different entrypoint to run Celery worker
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hopeup}:${POSTGRES_PASSWORD:-hopeup_dev_password}@postgres:5432/${POSTGRES_DB:-hopeup}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hopeup-net
    volumes:
      - ../../backend:/app

  beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: hopeup-beat
    restart: unless-stopped
    # Beat is the singleton scheduler; only one replica is allowed.
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hopeup-net
    volumes:
      - ../../backend:/app

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: hopeup-frontend
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
      NEXT_PUBLIC_WS_BASE: ws://backend:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hopeup-net
    volumes:
      - ../../frontend:/app
      - /app/node_modules
