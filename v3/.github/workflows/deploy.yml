name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - production
      tag:
        description: 'Image tag to deploy'
        required: true

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: hopeup-${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production') || 'staging' }}

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production') || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production') || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }}
          kubectl version --client

      - uses: yokawasa/action-setup-kube-tools@v0.11.1
        with:
          kustomize: '5.3.0'

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Pick overlay
        id: overlay
        run: |
          ENV="${{ github.event.inputs.environment || (startsWith(github.ref, 'refs/tags/v') && 'production') || 'staging' }}"
          if [ "$ENV" = "production" ]; then
            echo "path=infrastructure/kubernetes/overlays/prod" >> $GITHUB_OUTPUT
          else
            echo "path=infrastructure/kubernetes/overlays/dev" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags in kustomize
        working-directory: ${{ steps.overlay.outputs.path }}
        run: |
          kustomize edit set image \
            ghcr.io/hopeup/backend=${{ secrets.ECR_REGISTRY }}/hopeup-backend:${{ steps.tag.outputs.tag }} \
            ghcr.io/hopeup/frontend=${{ secrets.ECR_REGISTRY }}/hopeup-frontend:${{ steps.tag.outputs.tag }}

      - name: Run database migrations
        run: |
          kubectl apply -f infrastructure/kubernetes/base/migration-job.yaml -n hopeup
          kubectl wait --for=condition=complete --timeout=600s -n hopeup job/db-migrate

      - name: Apply manifests
        run: |
          kubectl apply -k ${{ steps.overlay.outputs.path }}

      - name: Wait for rollout
        run: |
          kubectl rollout status -n hopeup deployment/backend --timeout=10m
          kubectl rollout status -n hopeup deployment/frontend --timeout=10m
          kubectl rollout status -n hopeup deployment/worker --timeout=10m

      - name: Smoke test
        run: |
          # Replace with real synthetic test (curl health, login flow)
          kubectl exec -n hopeup deploy/backend -- curl -fs http://localhost:8000/health

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "Deploy ${{ steps.tag.outputs.tag }} to ${{ env.CLUSTER_NAME }}: ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
