{% extends "base.html" %}
{% block title %}HopeUp — Add Client{% endblock %}
{% block heading %}Add Client{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label>Contact Name</label>
            <input type="text" name="name" placeholder="John Smith" required autofocus>
        </div>
        <div class="form-group">
            <label>Company Name</label>
            <input type="text" name="company" placeholder="Acme Corp" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="john@acme.com" required>
        </div>
        <div class="form-group">
            <label>Business Tier</label>
            <select name="tier">
                {% for num, tier in tiers.items() %}
                <option value="{{ num }}">Tier {{ num }} — {{ tier.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Industry</label>
            <select name="industry">
                <option value="technology">Technology / SaaS</option>
                <option value="finance">Financial Services</option>
                <option value="healthcare">Healthcare</option>
                <option value="ecommerce">E-Commerce / Retail</option>
                <option value="government">Government</option>
                <option value="education">Education</option>
                <option value="manufacturing">Manufacturing</option>
                <option value="energy">Energy / Utilities</option>
                <option value="telecom">Telecommunications</option>
                <option value="defense">Defense / Aerospace</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">Add Client</button>
            <a href="{{ url_for('clients') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
