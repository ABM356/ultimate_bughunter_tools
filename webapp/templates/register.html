<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeUp Platform — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 400px; background: #111118; border: 1px solid #222; border-radius: 16px; padding: 2.5rem; }
        .login-box h1 { color: #00d4ff; font-size: 1.5rem; text-align: center; margin-bottom: 0.5rem; }
        .login-box .subtitle { color: #7f8c8d; text-align: center; font-size: 0.85rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.7rem 0.75rem; background: #0d0d14; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
        .btn { width: 100%; padding: 0.75rem; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #00b8d4; }
        .link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; }
        .link a { color: #00d4ff; text-decoration: none; }
        .flash { padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.85rem; }
        .flash-error { background: rgba(255,23,68,0.15); border: 1px solid #ff1744; color: #ff1744; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Create Account</h1>
        <div class="subtitle">Join the HopeUp Platform</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required autofocus>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="8">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="admin">Admin</option>
                    <option value="analyst" selected>Security Analyst</option>
                    <option value="manager">Manager</option>
                    <option value="viewer">Viewer</option>
                </select>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="link"><a href="{{ url_for('login') }}">Already have an account? Sign in</a></div>
    </div>
</body>
</html>
