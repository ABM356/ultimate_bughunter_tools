{% extends "base.html" %}
{% block title %}HopeUp — New Assessment{% endblock %}
{% block heading %}New Assessment{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label>Target Domain or IP</label>
            <input type="text" name="target" placeholder="example.com" required autofocus>
        </div>

        <div class="form-group">
            <label>Business Tier</label>
            <select name="tier">
                {% for num, tier in tiers.items() %}
                <option value="{{ num }}">Tier {{ num }} — {{ tier.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Scope</label>
            <select name="scope">
                <option value="red+blue">Red + Blue Team (Full)</option>
                <option value="red">Red Team Only (Offensive)</option>
                <option value="blue">Blue Team Only (Defensive)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Client (Optional)</label>
            <select name="client_id">
                <option value="">— No client —</option>
                {% for cid, client in clients.items() %}
                <option value="{{ cid }}">{{ client.company }} ({{ client.name }})</option>
                {% endfor %}
            </select>
        </div>

        <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">Create Assessment</button>
            <a href="{{ url_for('assessments') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>

<div class="card" style="max-width:600px;margin-top:1.25rem;">
    <h3 style="margin-bottom:0.75rem;">Tier Guide</h3>
    {% for num, tier in tiers.items() %}
    <div style="padding:0.5rem 0;border-bottom:1px solid #1a1a1a;">
        <strong style="color:#ffc400;">Tier {{ num }}</strong> — {{ tier.name }}
        <div style="color:#7f8c8d;font-size:0.85rem;">{{ tier.description }}</div>
    </div>
    {% endfor %}
</div>
{% endblock %}
